# 🎓  
# Hoofdstuk 20: Bitflags
### Efficiënt statusbeheer

---

## Machten van 2
### Bit-uniekheid

* Elke status krijgt een eigen bit.
* Gebruik `1 << n` voor unieke waarden.

* `1 << 0` = 0001 (1)
* `1 << 1` = 0010 (2)
* `1 << 2` = 0100 (4)

---

## Bitwise Operators
### De Gereedschapskist

* **`|` (OR)**: Vlag aanzetten.
* **`&` (AND)**: Vlag controleren.
* **`^` (XOR)**: Vlag togglen (omdraaien).
* **`&= ~`**: Vlag specifiek uitzetten.

---

## Praktijk: Render Flags

```cpp
enum Flags {
    SHADOWS = 1 << 0,
    BLOOM   = 1 << 1,
    FXAA    = 1 << 2
};

uint8_t settings = SHADOWS | FXAA; // 101 in bits

if (settings & SHADOWS) { /* Teken schaduw */ }
```

---

## Waarom Bitflags?
### De Ratio

* **Geheugen**: 8 vlaggen in 1 byte (`uint8_t`).
* **Snelheid**: Bitwise operaties gebeuren in één CPU-cyclus.
* **API Design**: Vervangt 10 booleans door 1 parameter.
